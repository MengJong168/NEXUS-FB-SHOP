<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Read - Yandex</title>

  <!-- Optional: reuse site css if you want -->
  <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> -->

  <!-- Page css -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/quickread.css') }}">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-left">
    <a href="/" class="logo">NEXUS FB SHOP</a>
  </div>
  <div class="header-right">
    <a href="/" class="nav-btn">Home</a>
  </div>
</header>

<!-- MAIN CONTENT -->
<main>
  <div class="wrap">
    <h2>Quick Read Yandex</h2>
    <p>Quick access to read Yandex</p>

    <div class="card">
      <form method="POST" action="/quickread/yandex" autocomplete="off">
        <div class="row">
          <div>
            <label>Username</label>
            <input name="username" placeholder="user@yandex.com" value="tgmengsell" required />
          </div>

          <div>
            <label>Password</label>
            <input name="password" placeholder="password" value="vmxpqtuytlmeehfo" required />
          </div>

          <div>
            <label>Target Email</label>
            <input name="target_email" placeholder="target@example.com" value="{{ target_email }}" required />
          </div>

          <div>
            <button class="btn" type="submit">Read Emails</button>
          </div>
        </div>
      </form>

      <div class="result">
        <div class="title">{{ result_title }}</div>
        <div class="msg">{{ result_message }}</div>

        {% if code %}
          <div class="code">{{ code }}</div>
        {% endif %}
      </div>

      <div class="hint">
        Note: Yandex may require an <b>App Password</b> and IMAP access enabled.
      </div>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-content">
    <p>&copy; 2025 NEXUS FB SHOP. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
