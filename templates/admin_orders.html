<!DOCTYPE html>
<html>
<head>
    <title>Admin Orders</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<h1>Order Management</h1>

<a href="/admin">⬅ Back to Admin</a>

<table>
    <tr>
        <th>Order ID</th>
        <th>User Email</th>
        <th>Service</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for o in orders %}
    <tr>
        <td>{{ o[0] }}</td>
        <td>{{ o[1] }}</td>
        <td>{{ o[2] }}</td>
        <td>{{ o[3] }}</td>
        <td>${{ "%.2f"|format(o[4]) }}</td>
        <td>{{ o[5] }}</td>
        <td>{{ o[6] }}</td>
        <td>
            <a href="/admin_order/{{ o[0] }}">View</a> |
            <a href="/delete_order/{{ o[0] }}" onclick="return confirm('Delete this order?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
