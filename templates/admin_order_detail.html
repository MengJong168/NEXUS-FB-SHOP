<!DOCTYPE html>
<html>
<head>
    <title>Order Detail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<a href="/admin_orders">⬅ Back to Orders</a>

<h2>Order ID: {{ order[0] }}</h2>

<div class="card order-info">
    <p><strong>User:</strong> {{ order[1] }}</p>
    <p><strong>Service:</strong> {{ order[2] }}</p>
    <p><strong>Quantity:</strong> {{ order[3] }}</p>
    <p><strong>Total:</strong> ${{ "%.2f"|format(order[4]) }}</p>
    <p><strong>Status:</strong> 
        <span class="status-{{ order[5] }}">{{ order[5] }}</span>
    </p>
    <p><strong>Date:</strong> {{ order[6] }}</p>
</div>

<h3>Accounts</h3>

<table>
<tr>
    <th>Account Data</th>
</tr>
{% for item in items %}
<tr>
    <td>{{ item[0] }}</td>
</tr>
{% endfor %}
</table>

<h3>Update Status</h3>

<form action="/update_order_status/{{ order[0] }}" method="POST">
    <select name="status">
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
        <option value="refunded">Refunded</option>
    </select>
    <button type="submit">Update</button>
</form>

</body>
</html>
