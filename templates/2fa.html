<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>2FA Authentication</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/quickread.css') }}">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <a href="/" class="logo">NEXUS FB SHOP</a>
  <a href="/" class="nav-btn">Home</a>
</header>

<!-- MAIN -->
<main>

<div class="wrap">

<h2>2FA Authentication</h2>
<p>Generate OTP codes from your 2FA keys</p>

<div class="card">

<form method="POST">

<div class="row">

<div>
<label>2FA Keys</label>

<input
name="keys"
placeholder="Enter 2FA key (Base32)"
value="{{ keys }}"
required
>

</div>

<div class="actions">
<button class="btn" type="submit">Get Code</button>
</div>

</div>

</form>

<div class="result">

<div class="title">{{ result_title }}</div>
<div class="msg">{{ result_message }}</div>

{% if results %}

<div class="code-wrap">

<div class="code" id="code">{{ results }}</div>

<button class="copy-btn"
onclick="navigator.clipboard.writeText(document.getElementById('code').innerText)">
Copy
</button>

</div>

{% endif %}

</div>

<div class="hint">
Codes refresh every 30 seconds (TOTP standard)
</div>

</div>

</div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
<p>© 2025 NEXUS FB SHOP. All rights reserved.</p>
</footer>

</body>
</html>
